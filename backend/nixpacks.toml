[phases.setup]
aptPkgs = ['build-essential', 'libpq-dev']

[phases.install]
cmds = ['pip install -r requirements.txt', 'python -m spacy download en_core_web_sm', "python -c \"from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')\""]

[start]
cmd = "sh -c 'alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT'"
